name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    name: Build, typecheck, lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify relative paths
        run: npm run lint:paths

      - name: Verify dist/index.html exists
        run: test -f dist/index.html

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Smoke test
        run: npm test
